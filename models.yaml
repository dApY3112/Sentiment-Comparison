# ============================================================================
# Current Production Configuration
# ============================================================================

production:
  current_setup:
    classifier:
      model: claude-haiku-4-5
      cost: "$0.50/M input tokens"
      use_case: "Intent classification, sentiment, urgency detection"
    
    generator:
      model: gpt-5-2-chat
      cost: "$2/M input tokens"
      use_case: "Vietnamese response generation, menu suggestions"
  
  monthly_costs_estimate:
    current: "$400-600/month"
    volume: "1M classification + 500K generation requests"
    
  optimization_candidates:
    conservative_switch:
      classifier: "Keep claude-haiku-4-5 ✅"
      generator: "Test qwen-3-5-flash → 95% cost savings ($2 → $0.10/M)"
      potential_savings: "$285/month (71% reduction)"
    
    aggressive_switch:
      classifier: "Switch to gpt-4o-mini → 85% savings"
      generator: "Switch to deepseek-v3 → 97% savings"
      potential_savings: "$475/month (90% reduction)"
      risk: "Must test thoroughly for Vietnamese quality"

# ============================================================================
# Quick Start Commands
# ============================================================================

quickstart:
  setup: |
    # Windows
    .\evals\setup.ps1
    
    # Linux/Mac
    bash evals/setup.sh
  
  run_test: |
    # Activate environment
    .\evals\venv\Scripts\Activate.ps1  # Windows
    source evals/venv/bin/activate      # Linux/Mac
    
    # Run essential test (all 12 models)
    python evals/compare_models.py --preset essential
    
    # Run specific test
    python evals/compare_models.py --preset classification
    python evals/compare_models.py --preset generation
  
  view_results: |
    # View latest results
    python evals/view_results.py --latest
    
    # Generate HTML report
    python evals/generate_report.py --preset essential

